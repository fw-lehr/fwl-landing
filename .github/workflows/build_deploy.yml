name: Build image to GHCR + deploy to server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
    build-and-push-website-frontend-image:
      runs-on: ubuntu-latest
      steps:
        - name: 'Checkout GitHub Action'
          uses: actions/checkout@v4

        - name: 'Login to GitHub Container Registry'
          uses: docker/login-action@v3
          with:
            registry: ghcr.io
            username: ${{github.actor}}
            password: ${{secrets.GITHUB_TOKEN}}

        - name: 'Build FW Lehr Website landing page image and push it to ghcr.io'
          run: |
               docker build --tag ghcr.io/fw-lehr/website-landingpage:latest . 
               docker push ghcr.io/fw-lehr/website-landingpage:latest

    deploy-to-vps-server:
        runs-on: ubuntu-latest
        needs: build-and-push-website-frontend-image
        environment: VPS-Server
        steps:
          - name: 'Checkout GitHub Action'
            uses: actions/checkout@v4

          - name: 'Deploy to Server via SSH-docker compose'
            uses: fw-lehr/docker-remote-deployment-action@v0.1
            env:
              APPTOKEN: ${{ secrets.GITHUB_TOKEN }}
              USERNAME: ${{ vars.DEPLOY_USERNAME }}
            with:
              remote_docker_host: ${{ vars.DEPLOY_USERNAME }}@${{ vars.DEPLOY_HOST }}
              ssh_private_key: ${{ secrets.PRIVATE_SSH_KEY }}
              docker_command: docker compose -f docker-compose.prod.yml up -d --pull always
              docker_login_user: ${{ github.actor }}
              docker_login_password: ${{ secrets.GITHUB_TOKEN }}
              docker_login_registry : ghcr.io